name: Playwright Java Tests

on:
  workflow_dispatch:
    inputs:
      notify_email:
        description: 'Send report to (email address)'
        required: true
        type: string

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y xvfb libgbm-dev

      - name: Install Playwright browsers
        run: |
          mvn exec:java \
            -Dexec.mainClass=com.microsoft.playwright.CLI \
            -Dexec.args="install --with-deps chromium" \
            --no-transfer-progress

      - name: Run Tests
        run: |
          xvfb-run --auto-servernum mvn test \
            -Dsurefire.suiteXmlFiles=testng.xml \
            -Dheadless=true \
            --no-transfer-progress

      - name: Publish Test Summary
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'target/surefire-reports/*.xml'
          fail_on_failure: false
          summary: true
          job_summary: true

      - name: Upload ExtentReport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: test-output/**/*.html
          retention-days: 7

